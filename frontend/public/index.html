<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#020617" />
    <meta name="description" content="CryptoRent - Automated Trading Bot Platform" />
    <title>CryptoRent Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #020617;
        color: #f8fafc;
      }
      /* Style for the AdBlock warning banner */
      #adblock-warning {
        display: none;
        background-color: #7f1d1d; /* Deep red */
        color: #fecaca;
        text-align: center;
        padding: 12px;
        font-size: 0.85rem;
        font-weight: 600;
        position: sticky;
        top: 0;
        z-index: 9999;
        border-bottom: 1px solid #991b1b;
      }
    </style>

    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    
    <script type="text/javascript">
      window.onload = function() {
        // 1. Check if the Paddle object exists (AdBlockers often kill it)
        if (typeof Paddle === 'undefined') {
          const warning = document.getElementById('adblock-warning');
          if (warning) warning.style.display = 'block';
          console.error("Critical: Paddle.js blocked by client (AdBlocker suspected).");
        } else {
          // 2. Initialize with the CORRECT token prefix (pdl_live_ or pdl_test_)
          Paddle.Initialize({ 
            token: "live_ad7a379459b1d35d3f39ad12653" 
          });
          console.log("Paddle.js initialized successfully.");
        }
      };
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BW8N53DM69"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BW8N53DM69');
    </script>
  </head>
  <body>
    <div id="adblock-warning">
      ⚠️ <strong>Billing System Blocked:</strong> Please disable your AdBlocker or "Shields" to activate your bot subscription.
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>

version: '3.8'

services:
  # 1. The FastAPI Backend
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:///./cryptorent.db
      - JWT_SECRET=your_super_secret_change_this
    restart: always

  # 2. The React Frontend
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend

  # 3. The Trading Engine (The Worker)
  # This runs the background loop to check RSI and execute trades
  engine:
    build: ./backend
    command: python -m app.core.engine
    volumes:
      - ./backend:/app
    depends_on:
      - backend
    restart: always

# Optional: If you move to Postgres later, you'd add a 'db' service here.